name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: '1.26.2'
  DOCKER_IMAGE: xusk947/mock-payment-provider

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install dependencies
      run: |
        go mod download
        go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
        go install github.com/pressly/goose/v3/cmd/goose@latest
        go install github.com/swaggo/swag/cmd/swag@latest

    - name: Generate sqlc code
      run: |
        cd sqlc && ~/go/bin/sqlc generate

    - name: Generate swagger docs
      run: ~/go/bin/swag init -g cmd/server/main.go --output cmd/server/docs

    - name: Run unit tests
      run: go test ./... -v -coverprofile=coverage.out -short

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        fail_ci_if_error: false

  e2e-test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    needs: test
    
    services:
      docker:
        image: docker:dind
        options: --privileged
        ports:
          - 2375:2375

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install dependencies
      run: |
        go mod download
        go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
        go install github.com/pressly/goose/v3/cmd/goose@latest
        go install github.com/swaggo/swag/cmd/swag@latest

    - name: Generate sqlc code
      run: |
        cd sqlc && ~/go/bin/sqlc generate

    - name: Generate swagger docs
      run: ~/go/bin/swag init -g cmd/server/main.go --output cmd/server/docs

    - name: Build application
      run: go build ./cmd/server

    - name: Run migrations
      run: |
        mkdir -p database
        ~/go/bin/goose -dir api/migrations sqlite database/payments.db up

    - name: Start server
      run: |
        ./server &
        sleep 5

    - name: Run E2E tests
      run: |
        go test ./test/e2e/... -v -timeout 10m
      env:
        SERVER_URL: http://localhost:3000
        TEST_API_KEY: test_api_key_12345

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, e2e-test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
          ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install dependencies
      run: |
        go mod download
        go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
        go install github.com/swaggo/swag/cmd/swag@latest

    - name: Generate sqlc code
      run: |
        cd sqlc && ~/go/bin/sqlc generate

    - name: Generate swagger docs
      run: ~/go/bin/swag init -g cmd/server/main.go --output cmd/server/docs

    - name: Run Gosec Security Scanner
      uses: securego/gosec@master
      with:
        args: -exclude-dir=sqlc ./...

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  standalone-container-test:
    name: Test Standalone Container
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        load: true
        tags: ${{ env.DOCKER_IMAGE }}:test

    - name: Run standalone container
      run: |
        docker run -d --name test-app -p 3000:3000 ${{ env.DOCKER_IMAGE }}:test
        sleep 10

    - name: Test container health
      run: |
        curl -f http://localhost:3000/admin/dashboard || exit 1

    - name: Check container logs
      run: docker logs test-app

    - name: Stop container
      run: docker stop test-app && docker rm test-app