version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - SERVER_PORT=3000
      - SERVER_HOST=0.0.0.0
      - DATABASE_PATH=./database/payments.db
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - THREEDS_ENABLED=true
      - GO_VERSION=1.26.2
    volumes:
      - ./database:/app/database
      - ./api/migrations:/app/api/migrations
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/admin/dashboard"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Test runner for E2E tests
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - SERVER_URL=http://app:3000
      - TEST_API_KEY=test_api_key_12345
    networks:
      - payment-network
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - test

networks:
  payment-network:
    driver: bridge

volumes:
  database:
    driver: local