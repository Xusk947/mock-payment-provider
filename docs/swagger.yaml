definitions:
  Transaction:
    type: object
    properties:
      id:
        type: integer
        example: 1
      amount:
        type: number
        format: decimal
        example: 100.50
      currency:
        type: string
        example: USD
      status:
        type: string
        example: pending
        enum: [pending, completed, failed, refunded]
      payment_method:
        type: string
        example: credit_card
      metadata:
        type: string
        example: '{"order_id": "12345"}'
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time

  CreateTransactionRequest:
    type: object
    required:
      - amount
      - payment_method
    properties:
      amount:
        type: number
        format: decimal
        example: 100.50
      currency:
        type: string
        example: USD
        default: USD
      payment_method:
        type: string
        example: credit_card
      metadata:
        type: string
        example: '{"order_id": "12345"}'

  ErrorResponse:
    type: object
    properties:
      error:
        type: string
        example: Error message